<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>雪师傅的特别感谢！</title>
  <style>
    * {
  -webkit-tap-highlight-color: transparent !important;
}
    body {
      margin: 0;
      background: #000;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;  }
    #text {
      color: #fff;
      font-size: 40px;
      text-align: center;
      font-family: "Times New Roman", "KaiTi", serif;
      max-width: 80vw;
      opacity: 0;
      transition: opacity 0.3s;
      line-height: 1.6;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #text.show { opacity: 1; }
    .admin-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.9);
      padding: 12px;
      border-radius: 10px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      z-index: 100;
      border: 1px solid #333;
    }
    body.admin .admin-panel { display: flex; }
    .admin-panel input, .admin-panel button, .admin-panel textarea, .admin-panel select {
      padding: 6px 10px;
      border-radius: 6px;
      background: #222;
      color: #fff;
      border: 1px solid #555;
    }
    .admin-panel textarea { width: 100%; }
  </style>
</head>
<body>
  <div id="text"></div>
  <div class="admin-panel">
    <textarea id="words" rows="4"></textarea>
    <input type="color" id="color" value="#ffffff">
    <input type="number" id="size" value="30">
    <select id="font">
      <option value="Times New Roman, KaiTi, serif">衬线体</option>
      <option value="微软雅黑, sans-serif">微软雅黑</option>
      <option value="Arial, sans-serif">Arial</option>
    </select>
    <button id="saveBtn">💾 保存</button>
  </div>

  <script>
    const ADMIN_PASSWORD = '123456';
    
    const DEFAULT_TEXTS = `脸边痒痒的，黏重的汗已冷却.
    凌乱的发丝附着在脸上，被一只手撩开。
这只手离你很近，灌注了饱含爱意的注视.
此刻正轻柔缓慢地，一缕缕剥出他心里那张美好柔软的睡脸。
他现在十分清醒，守在你身边珍惜这来之不易的温存。
无限幻美的时刻，寂寞无光的黑夜也秾丽得让人着迷。
求你——
请不要这么快醒来。
哪怕让他再多看一眼——
带着万千珍重的描摹，如同丝绒舔吻。
手的主人已足够小心。
可你还是醒了。
原因无他，热气腾腾的喘息实在刺得你睡不着觉。
仿佛遭受了一种洗礼，熟悉的气味包裹并占据着你
喷在脸上，滑进肩窝，狂热地窜进身体里乱流。
不得不醒、不能不醒，否则下一秒就要被爱的汪洋吞没。
唔？
所以现在是什么时候了？
天还是黑的，比起模糊的视觉，耳畔极力克制的呼吸声更让你在意。
渺远却沉重，如泄露的冰山一角。
怎么了，睡不着吗？
你往他怀里拱了拱，脸抵着温热的胸膛，其上爬满了情迷意乱的牙印。
复生话事人的身体——
长期被衬衫包裹，却也健美而鲜活，就这么心甘情愿做了你的口枷。
暴殄天物，还是求之不得？
他心里早有答案。
可你终归还是舍不得的。
呼——
摸摸——
慢慢的、轻轻的，带着一点被弄醒的小报复。
搂在腰间的臂弯揽得更紧了。
手指来回扫过一个又一个镌刻在体表的印记，接二连三。
看来……
某人今晚的次数有点多呀？
于是边摸边舔，齿痕深深，安抚地用脸轻蹭——
低声却不再克制的闷哼，整个人被猛地向上托举，这次换他靠在你颈窝。
高大的身体轻轻颤抖，仿佛在逃避着什么，又像忍受。
嗯？
你咬的很用力吗？
想不起来了……
但这也……都怪易遇吧？
入睡前的记忆被他搅得黏黏糊糊的，沐浴过温热的爱抚，几乎只剩泪痕
最后你已经没力气叫了，湿答答地趴在浴缸里任他摆布。
是……很疼吗？
还是问一下吧。
易先生一天几百个小目标你可耽误不起——
嗯……
易遇轻笑一声，像是没想到你会这么问，却也很满意。
不疼。
只是……
他的嘴唇轻轻贴着你的后颈摩擦，若即若离的，在你心里泛起层层叠叠的漪。
“很痒。”
怎么办？
你要负责。
闷闷的声音在你心间回响，潮气落在你耳边如霏霏淫雨。
雾里看花，他说的缠绵又笃定，一种小孩子般无理取闹的撒娇。
那……
要不给你……咬回来？
你摸着易遇的发尾，朝他露出柔嫩鲜美的颈部，心里隐隐生出绵而麻的期待。
还不如让他糟糕地对待你呢——
反正也差不过现在了。
这一侧的敏感带都被他撩拨过，却悬而未决地——
一次次舔吮。
咬回来吗？
灼热红肿的肌肤感受到他嘴角勾起的弧度。
不要。
——任性却轻巧，被爱者才有的底气。
他可舍不得。
况且这些星星点点的痕迹已足够。
足够证明他的存在。
想提更过分的要求，也想要她更多的爱——
于是他说：
“我想吻你。”
“可以吗？”
夜中无光，你却看到那双温和的铅灰色眼睛亮得星辉分明。
他在期待，易遇的眼神从来不曾像今天这般年轻。
他想要一个吻，一种许可，一种比肉体欢愉更长久隆重的东西——
爱。
请你同意他爱你，也希望你能爱他。
其实如果可以，易遇更想让你亲亲他，但事情总得循序渐进着来不是吗？
那么他就要——
一个再平凡不过却前所未有的吻。
即便是最微不足道的漪，也终有一日会在你体内为他掀起狂澜。
嗯？
只是这样？
你有点怀疑。
只要这样……就好了么？
刚才他向你索取的时候好像没这么客气呀……
然而易遇眼中的郑重不假，于是你也跟着轻轻点了点头。
像被蛊惑般——
被他捧起了脸。
吻，准确无误又异常精准地落下。
你不知道易遇是怎么做到的，或许有什么在指引着他，
又也许在你醒来前——
他已经用眼睛和手指描摹了你千百遍。
在听到自己的心音轰鸣如雷时，你才猛然意识到——
原来，接吻是没有声音的。
原来这里仅仅只是贴靠在一起，身体就会不自觉发烫。
可你们的嘴唇，早已触碰过彼此更私密的部位。
后颈、锁骨、胸口、腰窝……
那些带着渴望的触碰，湿润而响亮，波光粼粼的粘液时常在体表跃动情欲的火光。
可此时此刻，在这万籁俱寂、伸手不见五指的深夜
你们竟也能如两片舒展的草叶般倾枝相盖地交叠——
亲密如双燕衔尾、静谧如日月恒远皎洁。
你凝望着他，慢慢闭上眼睛，用舌尖轻轻擦拭优越的唇形，彼此都十分清醒地在暗夜中交换某种情愫。
睫毛拍在眼睑，一次便心绪翻飞。
易遇牵起你的手，收在掌心慢慢摩挲,最终却难以自持地挤进指缝与你十指相扣。
这双手……
要是可以永远都抓紧不放就好了。
体内暴雨如注，总有人要先起狂澜。
生命的律动透过指骨强势地奔流般传入你体内，要冲毁一切的岸，他的心率竟然比交媾时还要快。
”我爱你。“`;
    const textEl = document.getElementById('text');
    const wordsArea = document.getElementById('words');
    const colorInput = document.getElementById('color');
    const sizeInput = document.getElementById('size');
    const fontSelect = document.getElementById('font');
    const saveBtn = document.getElementById('saveBtn');
    
    let paragraphs = [], currentIndex = -1;
    
    // 音乐（第一次点击页面时播放）
    const audio = new Audio('yy_bgm_wangnian.m4a');
    audio.loop = true;
    
    document.body.addEventListener('click', function playMusic() {
      audio.play().catch(e => console.log('播放失败:', e));
      document.body.removeEventListener('click', playMusic);
    }, { once: true });
    // =================================================
    
    if (location.search.includes('admin=' + ADMIN_PASSWORD)) {
      document.body.classList.add('admin');
    }
    
    function updateTexts() {
      let raw = wordsArea.value.trim();
      if (!raw) raw = DEFAULT_TEXTS;
      paragraphs = raw.split('\n').filter(l => l.trim());
      currentIndex = -1;
      textEl.classList.remove('show');
    }
    
    function showNext() {
      if (!paragraphs.length) return;
      if (currentIndex >= paragraphs.length - 1) return;
      currentIndex++;
      textEl.classList.remove('show');
      setTimeout(() => {
        textEl.textContent = paragraphs[currentIndex];
        textEl.classList.add('show');
      }, 10);
    }
    
    function updateStyle() {
      textEl.style.color = colorInput.value;
      textEl.style.fontSize = sizeInput.value + 'px';
      textEl.style.fontFamily = fontSelect.value;
    }
    
    function saveData() {
      const data = { texts: wordsArea.value, color: colorInput.value, size: sizeInput.value, font: fontSelect.value };
      localStorage.setItem('mySiteData', JSON.stringify(data));
      alert('✓ 已保存');
    }
    
    function loadData() {
      const saved = localStorage.getItem('mySiteData');
      if (saved) {
        const data = JSON.parse(saved);
        wordsArea.value = data.texts || DEFAULT_TEXTS;
        colorInput.value = data.color || '#ffffff';
        sizeInput.value = data.size || '30';
        fontSelect.value = data.font || 'Times New Roman, KaiTi, serif';
      } else {
        wordsArea.value = DEFAULT_TEXTS;
      }
      updateTexts();
      updateStyle();
    }
    
    wordsArea.oninput = updateTexts;
    colorInput.oninput = updateStyle;
    sizeInput.oninput = updateStyle;
    fontSelect.onchange = updateStyle;
    saveBtn.onclick = saveData;
    
    document.body.onclick = (e) => {
      if (!e.target.closest('.admin-panel')) {
        showNext();
      }
    };
    
    loadData();
  </script>
</body>
</html>
